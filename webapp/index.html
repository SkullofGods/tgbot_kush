<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Меню</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Что тебе хочется? 💖</h1>
      <p>Выбери и нажми кнопку ниже</p>
    </header>

    <nav class="categories" id="categories">
      <button class="cat-btn active" data-cat="все">✨ Все</button>
      <button class="cat-btn" data-cat="еда">🍽 Еда</button>
      <button class="cat-btn" data-cat="напитки">🥤 Напитки</button>
      <button class="cat-btn" data-cat="вкусное">🍬 Вкусное</button>
      <button class="cat-btn" data-cat="услуги">💋 Услуги</button>
    </nav>

    <section id="items" class="grid"></section>

    <section class="note-box">
      <label for="note">Комментарий</label>
      <textarea id="note" placeholder="Например: разденься и встань раком"></textarea>
    </section>

    <footer class="footer">
      <button id="submitBtn" class="submit-btn">Хочу ✨</button>
    </footer>
  </main>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const itemsContainer = document.getElementById('items');
    const submitBtn = document.getElementById('submitBtn');
    const noteInput = document.getElementById('note');
    const selectedItems = new Map();

    let allItems = [];
    let activeCategory = 'все';

    // Категории — хардкод, чтобы не зависеть от данных
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderItems();
      });
    });

    function getUserName() {
      const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (!user) return 'Неизвестный пользователь';
      return [user.first_name, user.last_name].filter(Boolean).join(' ');
    }

    function toggleItem(item, card) {
      if (selectedItems.has(item.id)) {
        selectedItems.delete(item.id);
        card.classList.remove('selected');
      } else {
        selectedItems.set(item.id, { id: item.id, title: item.title, place: item.place });
        card.classList.add('selected');
      }
    }

    function createCard(item) {
      const card = document.createElement('article');
      card.className = 'card';
      if (selectedItems.has(item.id)) card.classList.add('selected');
      const isSelected = selectedItems.has(item.id);
      card.innerHTML =
        '<div class="card-image-wrap">' +
          '<img class="card-image" src="' + item.image + '" alt="' + item.title + '" loading="lazy" onerror="this.style.opacity=0">' +
        '</div>' +
        '<div class="card-body">' +
          '<h2 class="card-title">' + item.title + '</h2>' +
          '<p class="card-place">' + (item.place || '') + '</p>' +
          '<button class="card-toggle" type="button">' + (isSelected ? 'Выбрано 💖' : 'Выбрать') + '</button>' +
        '</div>';
      const button = card.querySelector('.card-toggle');
      button.addEventListener('click', function() {
        toggleItem(item, card);
        button.textContent = selectedItems.has(item.id) ? 'Выбрано 💖' : 'Выбрать';
      });
      return card;
    }

    function renderItems() {
      itemsContainer.innerHTML = '';
      var filtered = activeCategory === 'все'
        ? allItems
        : allItems.filter(function(i) { return i.category === activeCategory; });
      filtered.forEach(function(item) {
        itemsContainer.appendChild(createCard(item));
      });
    }

    function loadItems() {
      // cache-buster — чтобы браузер не подсовывал старый json
      return fetch('./items.json?v=2')
        .then(function(r) { return r.json(); })
        .then(function(items) {
          allItems = items;
          renderItems();
        })
        .catch(function(err) {
          console.error(err);
          tg.showAlert('Не удалось загрузить карточки');
        });
    }

    submitBtn.addEventListener('click', function() {
      var items = Array.from(selectedItems.values());
      if (!items.length) {
        tg.showAlert('Выбери хотя бы одну позицию. Ну пожалуйста');
        return;
      }
      tg.sendData(JSON.stringify({
        user_name: getUserName(),
        note: noteInput.value.trim(),
        items: items
      }));
    });

    loadItems();
  </script>
</body>
</html>
