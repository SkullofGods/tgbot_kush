<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Меню хотелок</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Что тебе хочется? 💕</h1>
      <p>Выбери вкусняшки и нажми кнопку ниже</p>
    </header>

    <section id="items" class="grid"></section>

    <section class="note-box">
      <label for="note">Комментарий</label>
      <textarea id="note" placeholder="Например: очень хочется сегодня именно это"></textarea>
    </section>

    <footer class="footer">
      <button id="submitBtn" class="submit-btn">Хочу ✨</button>
    </footer>
  </main>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const itemsContainer = document.getElementById('items');
    const submitBtn = document.getElementById('submitBtn');
    const noteInput = document.getElementById('note');
    const selectedItems = new Map();

    function getUserName() {
      const user = tg.initDataUnsafe?.user;
      if (!user) return 'Неизвестный пользователь';
      return [user.first_name, user.last_name].filter(Boolean).join(' ');
    }

    function toggleItem(item, card) {
      if (selectedItems.has(item.id)) {
        selectedItems.delete(item.id);
        card.classList.remove('selected');
      } else {
        selectedItems.set(item.id, { id: item.id, title: item.title, place: item.place });
        card.classList.add('selected');
      }
    }

    function createCard(item) {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <img class="card-image" src="${item.image}" alt="${item.title}" loading="lazy">
        <div class="card-body">
          <h2 class="card-title">${item.title}</h2>
          <p class="card-place">${item.place}</p>
          <button class="card-toggle" type="button">Выбрать</button>
        </div>
      `;
      const button = card.querySelector('.card-toggle');
      button.addEventListener('click', () => {
        toggleItem(item, card);
        button.textContent = selectedItems.has(item.id) ? 'Выбрано 💖' : 'Выбрать';
      });
      return card;
    }

    async function loadItems() {
      const response = await fetch('./items.json');
      const items = await response.json();
      items.forEach(item => itemsContainer.appendChild(createCard(item)));
    }

    submitBtn.addEventListener('click', () => {
      const items = Array.from(selectedItems.values());
      if (!items.length) {
        tg.showAlert('Выбери хотя бы одну позицию 💕');
        return;
      }
      tg.sendData(JSON.stringify({
        user_name: getUserName(),
        note: noteInput.value.trim(),
        items
      }));
    });

    loadItems().catch(err => {
      console.error(err);
      tg.showAlert('Не удалось загрузить карточки');
    });
  </script>
</body>
</html>
