<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Меню</title>
  <link rel="stylesheet" href="./styles.css?v=3" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Что тебе хочется? 💖</h1>
      <p>Выбери и нажми кнопку ниже</p>
    </header>

    <nav class="categories">
      <button class="cat-btn" data-cat="еда">🍽 Еда</button>
      <button class="cat-btn" data-cat="напитки">🥤 Напитки</button>
      <button class="cat-btn" data-cat="вкусное">🍬 Вкусное</button>
      <button class="cat-btn" data-cat="услуги">💋 Услуги</button>
    </nav>

    <section id="items" class="grid"></section>

    <section class="note-box">
      <label for="note">Комментарий</label>
      <textarea id="note" placeholder="Например: разденься и встань раком"></textarea>
    </section>

    <footer class="footer">
      <button id="submitBtn" class="submit-btn">Хочу ✨</button>
    </footer>
  </main>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    var itemsContainer = document.getElementById('items');
    var submitBtn = document.getElementById('submitBtn');
    var noteInput = document.getElementById('note');
    var selectedItems = {};
    var allItems = [];
    var activeCategory = null; // null = показывать все

    // Клик по категории: выбрать или снять выбор
    var catBtns = document.querySelectorAll('.cat-btn');
    for (var ci = 0; ci < catBtns.length; ci++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          var cat = btn.getAttribute('data-cat');
          if (activeCategory === cat) {
            activeCategory = null;
            btn.classList.remove('active');
          } else {
            activeCategory = cat;
            for (var i = 0; i < catBtns.length; i++) catBtns[i].classList.remove('active');
            btn.classList.add('active');
          }
          renderItems();
        });
      })(catBtns[ci]);
    }

    function getUserName() {
      var user = tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (!user) return 'Неизвестный пользователь';
      return [user.first_name, user.last_name].filter(Boolean).join(' ');
    }

    function createCard(item) {
      var card = document.createElement('article');
      card.className = 'card' + (selectedItems[item.id] ? ' selected' : '');

      var wrap = document.createElement('div');
      wrap.className = 'card-image-wrap';
      var img = document.createElement('img');
      img.className = 'card-image';
      img.src = item.image;
      img.alt = item.title;
      img.loading = 'lazy';
      img.onerror = function() { this.style.opacity = 0; };
      wrap.appendChild(img);

      var body = document.createElement('div');
      body.className = 'card-body';

      var h2 = document.createElement('h2');
      h2.className = 'card-title';
      h2.textContent = item.title;

      var place = document.createElement('p');
      place.className = 'card-place';
      place.textContent = item.place || '';

      var btn = document.createElement('button');
      btn.className = 'card-toggle';
      btn.type = 'button';
      btn.textContent = selectedItems[item.id] ? 'Выбрано 💖' : 'Выбрать';

      btn.addEventListener('click', function() {
        if (selectedItems[item.id]) {
          delete selectedItems[item.id];
          card.classList.remove('selected');
          btn.textContent = 'Выбрать';
        } else {
          selectedItems[item.id] = { id: item.id, title: item.title, place: item.place };
          card.classList.add('selected');
          btn.textContent = 'Выбрано 💖';
        }
      });

      body.appendChild(h2);
      body.appendChild(place);
      body.appendChild(btn);
      card.appendChild(wrap);
      card.appendChild(body);
      return card;
    }

    function renderItems() {
      itemsContainer.innerHTML = '';
      var list = activeCategory
        ? allItems.filter(function(i) { return i.category === activeCategory; })
        : allItems;
      for (var i = 0; i < list.length; i++) {
        itemsContainer.appendChild(createCard(list[i]));
      }
    }

    fetch('./items.json?v=3')
      .then(function(r) { return r.json(); })
      .then(function(items) {
        allItems = items;
        renderItems();
      })
      .catch(function(err) {
        console.error(err);
        tg.showAlert('Не удалось загрузить карточки');
      });

    submitBtn.addEventListener('click', function() {
      var items = Object.values(selectedItems);
      if (!items.length) {
        tg.showAlert('Выбери хотя бы одну позицию. Ну пожалуйста');
        return;
      }
      tg.sendData(JSON.stringify({
        user_name: getUserName(),
        note: noteInput.value.trim(),
        items: items
      }));
    });
  </script>
</body>
</html>
